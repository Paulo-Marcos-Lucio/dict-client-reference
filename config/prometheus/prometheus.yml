global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dict-client-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          app: dict-client-reference
          env: local

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          app: otel-collector
